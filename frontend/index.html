<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bean & Brew Coffee Co.</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
    <div class="logo"> Bean & Brew</div>
    <nav>
        <button onclick="showHome()">Our Objective</button>
        <button onclick="showShop()">Online Shop</button>
        <button onclick="showLocations()">Our Locations</button>
        <button onclick="showLogin()">Login</button>
    </nav>
</header>

<main id="app"></main>

<!-- Cookie Notice - Added by Raees -->
<!-- This banner appears on first visit and asks users to accept cookies -->
<!-- Uses localStorage to remember user's choice so it won't show again after acceptance -->
<div id="cookieNotice" class="cookie-notice">
    <div class="cookie-content">
        <p>🍪 We use cookies to enhance your experience. By continuing to visit this site you agree to our use of cookies.</p>
        <button id="acceptCookies" class="cookie-btn">Accept</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
